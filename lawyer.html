<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Justice Connect - Lawyer Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            width: 450px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #1f2a44;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        textarea {
            resize: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #1f2a44;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2e3b5f;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Lawyer Registration</h2>
    <form>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter full name" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="email@example.com" required>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="tel" placeholder="+91 XXXXX XXXXX" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Enter password" required>
        </div>

        <div class="form-group">
            <label>City</label>
            <input type="text" placeholder="Enter city" required>
        </div>

        <div class="form-group">
            <label>State</label>
            <select required>
                <option value="">Select State</option>
                <option>Uttar Pradesh</option>
                <option>Delhi</option>
                <option>Maharashtra</option>
                <option>Rajasthan</option>
            </select>
        </div>

        <div class="form-group">
            <label>Bar Council Number</label>
            <input type="text" placeholder="Enter Bar Council No." required>
        </div>

        <div class="form-group">
            <label>Specialization</label>
            <input type="text" placeholder="e.g. Criminal, Civil, Corporate Law" required>
        </div>

        <div class="form-group">
            <label>Experience (Years)</label>
            <input type="number" placeholder="Enter experience in years" required>
        </div>

        <div class="form-group">
            <label>Court</label>
            <input type="text" placeholder="e.g. High Court, District Court" required>
        </div>

        <div class="form-group">
            <label>Consultation Fee (₹)</label>
            <input type="number" placeholder="Enter fee amount" required>
        </div>

        <div class="form-group">
            <label>Bio</label>
            <textarea rows="3" placeholder="Write short professional bio" required></textarea>
        </div>

        <button type="submit">Create Account</button>

    </form>
</div>

</body>
</html>
